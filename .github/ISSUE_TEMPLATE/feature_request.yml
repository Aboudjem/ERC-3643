name: ✨ Feature request
description: Suggest a new feature or enhancement
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do? Why is this useful?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should it work? Include API sketches if helpful.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits the educational, non-production scope of Raptor
        - label: I'd be willing to send a PR for this
