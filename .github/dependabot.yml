version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      hardhat:
        patterns:
          - "hardhat*"
          - "@nomicfoundation/*"
          - "@nomiclabs/*"
          - "@typechain/*"
      openzeppelin:
        patterns:
          - "@openzeppelin/*"
      dev-tooling:
        patterns:
          - "prettier*"
          - "eslint*"
          - "solhint*"
          - "husky*"
          - "@typescript-eslint/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
